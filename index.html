<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicole's Music Player - GUTS Album</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen flex">
    <div class="container flex w-full h-screen">
        <!-- Profile Sidebar -->
        <aside class="profile w-64 bg-gray-800/50 backdrop-blur-sm border-r border-gray-700/50 p-6 h-full overflow-y-auto">
            <div class="profile-info text-center mb-8">
                <img src="NICOLE.jpg" alt="Nicole's Profile" class="profile-pic w-24 h-24 mx-auto rounded-full border-4 border-purple-500 mb-4">
                <div class="profile-details">
                    <h1 class="text-xl font-bold text-purple-500 mb-2">Nicole</h1>
                    <p class="text-sm text-gray-400">Birthday Boy</p>
                </div>
            </div>
            <div class="playlist">
                <h2 class="text-lg font-semibold text-purple-500 mb-4">GUTS Playlist</h2>
                <ul id="playlist" class="space-y-2">
                    <!-- Playlist items will be inserted here by JavaScript -->
                </ul>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content flex-1 p-6 overflow-y-auto">
            <header class="player-header mb-8 flex items-center">
                <div class="album-art w-48 h-48 flex-shrink-0">
                    <img src="NICOLE.jpg" alt="Album Art" id="current-album-art" class="w-full h-full object-cover rounded-lg shadow-xl">
                </div>
                <div class="song-info ml-6">
                    <h2 id="current-song-title" class="text-2xl font-bold mb-2">Song Title</h2>
                    <p id="current-song-artist" class="text-lg text-gray-400">Artist Name</p>
                </div>
            </header>
            
            <section class="lyrics-section mb-8 flex-1">
                <div id="lyrics-display" class="lyrics bg-gray-800/50 backdrop-blur-sm p-6 rounded-xl border border-gray-700/50 text-gray-200 leading-relaxed text-lg whitespace-pre-line overflow-y-auto max-h-96">
                    Lyrics will appear here when a song is playing...
                </div>
            </section>
            
            <footer class="player-controls flex flex-col items-center w-full">
                <div class="controls flex items-center gap-4">
                    <button id="shuffle-btn" class="control-btn p-2 rounded-full hover:bg-gray-700/50 transition-transform duration-200 hover:scale-110">
                        <span class="material-icons text-lg">shuffle</span>
                    </button>
                    <button id="prev-btn" class="control-btn p-2 rounded-full hover:bg-gray-700/50 transition-transform duration-200 hover:scale-110">
                        <span class="material-icons text-lg">skip_previous</span>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-pause p-3 rounded-full hover:bg-purple-500 transition-transform duration-200 hover:scale-105">
                        <span class="material-icons text-2xl">play_arrow</span>
                    </button>
                    <button id="next-btn" class="control-btn p-2 rounded-full hover:bg-gray-700/50 transition-transform duration-200 hover:scale-110">
                        <span class="material-icons text-lg">skip_next</span>
                    </button>
                    <button id="repeat-btn" class="control-btn p-2 rounded-full hover:bg-gray-700/50 transition-transform duration-200 hover:scale-110">
                        <span class="material-icons text-lg">repeat</span>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="material-icons text-lg">volume_up</span>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="w-24">
                    </div>
                </div>
                <div class="progress-container w-full max-w-2xl mt-4">
                    <div class="progress-bar w-full h-2 bg-gray-700/50 rounded overflow-hidden">
                        <div class="progress-fill h-full bg-purple-500 w-0" id="progress-fill"></div>
                    </div>
                    <div class="time-display flex justify-between text-sm text-gray-400 mt-1">
                        <span id="current-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
